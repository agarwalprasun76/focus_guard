<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard Status</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 13px;
      opacity: 0.9;
    }

    .status-value {
      font-size: 13px;
      font-weight: 600;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    .status-dot.disconnected {
      background: #f87171;
      box-shadow: 0 0 8px #f87171;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .tabs-count {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin: 8px 0;
    }

    .tabs-label {
      font-size: 12px;
      text-align: center;
      opacity: 0.8;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
    }

    .footer a {
      color: #fff;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      text-align: center;
    }

    .refresh-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon32.png" alt="FocusGuard">
    <h1>FocusGuard</h1>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Connection Status</span>
      <span class="status-indicator">
        <span id="status-dot" class="status-dot disconnected"></span>
        <span id="status-text" class="status-value">Checking...</span>
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Browser</span>
      <span id="browser-name" class="status-value">-</span>
    </div>
  </div>

  <div class="status-card">
    <div id="tabs-count" class="tabs-count">-</div>
    <div class="tabs-label">Open Tabs Tracked</div>
  </div>

  <div id="error-container" style="display: none;">
    <div class="error-message">
      <span id="error-text"></span>
    </div>
  </div>

  <button id="refresh-btn" class="refresh-btn">Refresh Status</button>

  <div class="footer">
    <p>FocusGuard Tab Monitor v1.0.0</p>
    <p style="margin-top: 4px;">
      <a href="https://github.com/agarwalprasun76/focus_guard" target="_blank">Learn more</a>
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
