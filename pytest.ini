[pytest]
python_files = test_*.py
python_functions = test_*
python_classes = Test*
pythonpath = .

# Add the project root to the Python path during test collection
addopts = --import-mode=importlib
asyncio_default_fixture_loop_scope = function

markers =
    openai_live: real OpenAI API (opt-in via FOCUS_GUARD_RUN_OPENAI_INTEGRATION=1); costs quota
