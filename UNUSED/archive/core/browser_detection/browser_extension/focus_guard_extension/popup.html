<!DOCTYPE html>
<html>
<head>
  <title>FocusGuard Tab Tracker</title>
  <meta charset="utf-8">
  <style>
    :root {
      --primary-color: #4a6fa5;
      --success-color: #28a745;
      --error-color: #dc3545;
      --warning-color: #ffc107;
      --text-color: #333;
      --border-color: #ddd;
      --bg-color: #f8f9fa;
    }
    
    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      margin: 0;
      color: var(--text-color);
      background-color: var(--bg-color);
      font-size: 14px;
      line-height: 1.5;
    }
    
    h1 {
      font-size: 18px;
      color: var(--primary-color);
      margin: 0 0 15px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }
    
    h2 {
      font-size: 15px;
      margin: 15px 0 10px 0;
      color: var(--primary-color);
    }
    
    .status {
      padding: 10px 12px;
      margin: 0 0 15px 0;
      border-radius: 4px;
      font-size: 13px;
      border-left: 4px solid transparent;
      transition: all 0.3s ease;
    }
    
    .status.connected {
      background-color: rgba(40, 167, 69, 0.1);
      border-left-color: var(--success-color);
      color: #155724;
    }
    
    .status.disconnected {
      background-color: rgba(220, 53, 69, 0.1);
      border-left-color: var(--error-color);
      color: #721c24;
    }
    
    .tabs-count {
      margin: 10px 0;
      font-size: 13px;
      color: #666;
    }
    
    .last-updated {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
      font-style: italic;
    }
    
    .settings {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
    }
    
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    
    input[type="checkbox"] {
      margin-right: 8px;
      vertical-align: middle;
    }
    
    button {
      background-color: var(--primary-color);
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background-color 0.2s;
      width: 100%;
      margin-top: 5px;
    }
    
    button:hover {
      background-color: #3a5a8c;
    }
    
    button:active {
      transform: translateY(1px);
    }
    
    .error-message {
      background-color: rgba(220, 53, 69, 0.1);
      color: var(--error-color);
      padding: 8px 12px;
      border-radius: 4px;
      margin: 10px 0;
      font-size: 12px;
      border-left: 3px solid var(--error-color);
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .checkbox-container {
      display: flex;
      align-items: center;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <h1>FocusGuard Tab Tracker</h1>
  
  <div id="status" class="status disconnected">
    Checking connection...
  </div>
  
  <div class="tabs-count">
    <span id="tabsCount">0</span> tabs currently being tracked
  </div>
  
  <div class="settings">
    <h2>Settings</h2>
    <label for="apiEndpoint">FocusGuard API Endpoint:</label>
    <input type="text" id="apiEndpoint" placeholder="http://localhost:5000/api/tabs">
    
    <label for="updateInterval">Update Interval (ms):</label>
    <input type="number" id="updateInterval" min="1000" step="1000" placeholder="5000">
    
    <label>
      <input type="checkbox" id="debugMode"> Enable Debug Mode
    </label>
    
    <button id="saveSettings">Save Settings</button>
  </div>
  
  <script src="js/popup.js"></script>
</body>
</html>
